<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problem: Simple Website</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Times New Roman', Times, serif;
            background-color: #cccccc; 
        }

        nav {
            background-color: #444444; 
            padding: 15px 0;
            display: flex;
            justify-content: center;
        }

        nav ul {
            list-style-type: none; 
            margin: 0;
            padding: 0;
            display: flex;
        }

        nav ul li {
            margin: 0 20px;
        }

        nav ul li a {
            color: white;
            text-decoration: none; 
            font-size: 1.2em;
            font-weight: bold;
        }

        nav ul li a:hover {
            color: #aaa;
        }

        main {
            padding: 20px 40px;
        }

        article {
            margin-bottom: 30px;
        }

        h2 {
            margin-bottom: 5px;
            font-size: 1.8em;
        }

        .meta-info {
            font-style: italic;
            color: #555;
            margin-bottom: 15px;
        }

        .content {
            font-size: 1.2em;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Tutorials</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Newsletter</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <main>
        <article>
            <header>
                <h2>Just Another Day</h2>
                <p class="meta-info">Written by Christina on January 11th</p>
            </header>
            <p class="content">This is my second blog entry, and I just wanted to check in on you</p>
        </article>

        <article>
            <header>
                <h2>My First Blog Entry</h2>
                <p class="meta-info">Written by Christina on January 10th</p>
            </header>
            <p class="content">I'm so happy to write my first blog entry – yay!</p>
        </article>
    </main>

</body>
</html>
